version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: travello-db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-travello}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: travello-backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE=${POSTGRES_DB:-travello}
      - USER=${POSTGRES_USER:-postgres}
      - PASSWORD=${POSTGRES_PASSWORD}
      - HOST=db
      - PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-43200}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ORIGINS=http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: travello-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./backend/data:/app/data

volumes:
  postgres_data:
